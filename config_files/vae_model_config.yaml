model:
  arch: cnn   # <-- "mlp" or "cnn"

  # common knobs
  max_snps: 1200
  seed: 42
  subset_snps: 10000
  subset_mode: random
  deterministic_latent: false

  # grid (keep using your param_id grid if you want)
  latent_dim_grid: [16]  # Single latent dimension

  # ---- MLP-specific (only used if arch: mlp) ----
  mlp:
    hidden_dim_grid: [512]
    depth_grid: [3]

  # ---- CNN-specific (only used if arch: cnn) ----
  cnn:
    channels_grid:
      - [32, 64, 128]      # Single medium network
    kernel_size_grid: [5]   # Single kernel size
    dropout_grid: [0.1]     # Single dropout rate
    use_batchnorm: [true]   # can also be a grid if you want

training:
  batch_size: 64
  epochs: 2000
  epochs_tune: 100
  lr: 1e-4
  tune_fraction: 0.2
  val_fraction: 0.1
  beta_grid: [0.01]  # Single beta value
  seed: 42
  early_stopping_patience: 50
  early_stopping_min_delta: 0.0
  mask_perc: 0.0
