model:
  latent_dim_grid: [2, 8, 16, 32]
  hidden_dim_grid: [256, 512, 1024]
  depth_grid: [1, 3, 6]
  max_snps: 1200
  seed: 42

  # optional knobs if your GenotypeVAE supports them
  # activation: "relu"
  # use_batchnorm: false
  # dropout: 0.0
  # deterministic_latent: false  # if you add this later

training:
  batch_size: 64
  epochs: 2000
  epochs_tune: 100
  lr: 1e-4
  tune_fraction: 0.2
  val_fraction: 0.1
  beta_grid: [0.0, 0.001, 0.01, 0.1, 1.0]
  seed: 42
  early_stopping_patience: 50   # 0 = disabled
  early_stopping_min_delta: 0.0 # optional
  mask_perc: 0.0