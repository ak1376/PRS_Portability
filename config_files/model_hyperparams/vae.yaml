model:
  latent_dim: 256
  hidden_channels: [64, 128, 256, 256]
  kernel_size: 33
  stride: 4
  padding: 16
  use_batchnorm: false

training:
  batch_size: 32
  max_epochs: 200
  lr: 1e-4              # Lower LR for stability
  beta: 0.0001          # Start with very low beta
  weight_decay: 1e-5
  gradient_clip_val: 1.0  # Clip gradients to prevent explosion

masking:
  enabled: true

  # objective weighting
  alpha_masked: 1.0

  # geometry
  mode: "contiguous"
  n_blocks: 16
  allow_overlap: true

  # length control (choose ONE)
  mask_frac: 0.20      # total fraction masked per sample
  block_len: null      # if set (int), overrides mask_frac and is PER-BLOCK length

  # corruption / fill
  fill: "gaussian"     # gaussian | zero | mean | constant
  gaussian_std: 0.1
  constant_value: 0.0

seed: 0

grid:
  enabled: false
  name:
    prefix: "vae"
    sep: "__"
  dims:
    - path: "masking.mask_frac"
      values: [0.01, 0.10, 0.20, 0.30, 0.5, 0.8]
      tag: "mf"

    # - path: "masking.n_blocks"
    #   values: [1, 2, 4, 8]
    #   tag: "nb"

    # - path: "masking.gaussian_std"
    #   values: [0.05, 0.1, 0.2]
    #   tag: "gs"