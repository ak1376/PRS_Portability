model:
  model_type: "fully_conv"
  latent_dim: 128
  hidden_channels: [64, 128, 256]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 100
  lr: 5e-4
  beta: 1e-5
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: "32-true"
  log_every_n_steps: 10
  num_workers: 0
  overfit_one_batch: false
  overfit_n: 64

masking:
  enabled: true
  use_mask_channel: true
  alpha_masked: 0.8
  mode: "contiguous"
  n_blocks: 2
  allow_overlap: false
  mask_frac: null
  block_len: 10
  fill: "zero"
  gaussian_std: 0.0
  constant_value: 0.0

seed: 0

grid:
  enabled: true
  name:
    prefix: "vae"
    sep: "__"
  dims:
    - path: "masking.n_blocks"
      values: [1, 2, 3, 4, 5]
      tag: "nblocks"

  