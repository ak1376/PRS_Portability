model:
  latent_dim: 64
  hidden_channels: [64, 128]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false   # <- simplest

training:
  batch_size: 64
  max_epochs: 100
  lr: 3e-4
  beta: 0.001
  weight_decay: 1e-5
  precision: "32-true"
  log_every_n_steps: 1
  num_workers: 4

masking:
  enabled: true
  block_len: 256
  fill_value: "zero"
  weight_masked: 3.0
  weight_unmasked: 0.0

seed: 0

# --------------------------
# NEW: grid definition
# --------------------------
grid:
  enabled: false

  # how experiment names are built
  # (optional; if omitted we’ll use key=value pieces)
  name:
    prefix: "vae"
    sep: "__"

  # list of sweep dimensions
  # each item is: path + values
  # path uses dot notation into this YAML
  dims:
    - path: "masking.block_len"
      values: [64, 128, 256, 512, 1024]
      tag: "block"

    # - path: "model.latent_dim"
    #   values: [32, 64]
    #   tag: "z"          # optional alias for naming

