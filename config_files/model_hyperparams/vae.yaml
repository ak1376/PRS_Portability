model:
  model_type: "fully_conv"
  latent_dim: 32
  hidden_channels: [32]
  kernel_size: 9
  stride: 2
  padding: 4
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 100
  lr: 5e-4
  beta: 0.0
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: "32-true"
  log_every_n_steps: 10
  num_workers: 0

masking:
  enabled: false
  alpha_masked: 1.0
  mode: "contiguous"
  n_blocks: 2
  allow_overlap: false
  mask_frac: null
  block_len: 100
  fill: "constant"
  gaussian_std: 0.0
  constant_value: -1.0

seed: 0
grid:
  enabled: false