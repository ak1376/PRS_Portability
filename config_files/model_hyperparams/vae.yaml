model:
  latent_dim: 64
  hidden_channels: [64, 128]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false

training:
  batch_size: 32
  lr: 3e-4
  beta: 0.001
  weight_decay: 1e-5

masking:
  enabled: true

  # objective weighting
  alpha_masked: 1.0

  # geometry
  mode: "contiguous"
  n_blocks: 4
  allow_overlap: true

  # length control (choose ONE)
  mask_frac: 0.20      # total fraction masked per sample
  block_len: null      # if set (int), overrides mask_frac and is PER-BLOCK length

  # corruption / fill
  fill: "gaussian"     # gaussian | zero | mean | constant
  gaussian_std: 0.1
  constant_value: 0.0

seed: 0

grid:
  enabled: true
  name:
    prefix: "vae"
    sep: "__"
  dims:
    - path: "masking.mask_frac"
      values: [0.01, 0.10, 0.20, 0.30, 0.5, 0.8]
      tag: "mf"

    # - path: "masking.n_blocks"
    #   values: [1, 2, 4, 8]
    #   tag: "nb"

    # - path: "masking.gaussian_std"
    #   values: [0.05, 0.1, 0.2]
    #   tag: "gs"