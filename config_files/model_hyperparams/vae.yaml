model:
  model_type: "fully_conv"
  latent_dim: 32
  hidden_channels: [32]
  kernel_size: 9
  stride: 2
  padding: 4
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 100
  lr: 5e-4
  beta: 1e-5
  weight_decay: 0.0
  gradient_clip_val: 1.0
  precision: "32-true"
  log_every_n_steps: 10
  num_workers: 0
  overfit_one_batch: false
  overfit_n: 64

masking:
  enabled: true
  alpha_masked: 1.0
  mode: "contiguous"
  n_blocks: 2
  allow_overlap: false
  mask_frac: null
  block_len: 100
  fill: "constant"
  gaussian_std: 0.0
  constant_value: -1.0

seed: 0

grid:
  enabled: true
  name:
    prefix: "vae"
    sep: "__"
  dims:
    - path: "masking.block_len"
      values: [5, 10, 15, 20, 25, 30, 35, 40]
      tag: "blocklen"