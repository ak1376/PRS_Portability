model:
  latent_dim: 64
  hidden_channels: [64, 128, 256]
  kernel_size: 17
  stride: 2
  padding: 8
  use_batchnorm: false

training:
  batch_size: 64
  max_epochs: 50
  lr: 0.001  
  beta: 0.01 
  weight_decay: 1e-5
  precision: "32-true"
  log_every_n_steps: 1
  num_workers: 4

masking:
  enabled: true
  block_len: 1000          # contiguous SNP block length to mask
  fill_value: "mean"      # "mean" or "zero"
  weight_masked: 10.0      # knob: emphasize masked reconstruction
  weight_unmasked: 0.0    # knob: also score unmasked if >0

seed: 0