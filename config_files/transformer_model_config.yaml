grid:
  embed_dim: [128]
  n_heads: [8]
  n_layers: [4]
  ff_dim: [256]
  dropout: [0.1]
  pool: ["mean"]
  lr: [1e-4]
  contrastive_lambda: [0.0, 0.1, 0.5, 1.0]

base:
  model:
    vocab_size: 3
    pad_id: null
    max_len: 50000

  training:
    batch_size: 64
    epochs: 200
    seed: 42
    weight_decay: 0.0
    grad_clip: 1.0
    num_workers: 2
    amp: false
    debug_every: 5
    debug_n_show: 2
    debug_max_sites: 256

    contrastive:
      enabled: true   # will be auto-set false if lambda==0.0 (see Snakefile)
      tau: 0.2
      permute_negatives: true
      permute_every_k: 1
      p_mask_site_ctr: 0.20   # NEW

  masking:
    p_mask_site: 0.75
    mask_id: 2

  data:
    window_len: 512
    window_mode: "fixed"
    fixed_start: 0
    maf_threshold: 0.01
